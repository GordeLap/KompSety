<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Неупорядоченный список</title>
    </head>
    <body>
        <h1>Список изученных тегов</h1>
        <ul>
            <li TYPE="circle">html</li>
            <li TYPE="circle">head</li>
            <li TYPE="circle">body</li>
            <li TYPE="circle">h1</li>
            <li TYPE="circle">br</li>
            <li TYPE="circle">li</li>
        </ul>
        <p>Неупорядоченный список используется для простого перечисления объектов, когда порядок неважен.</p>
    </body>
</html>
